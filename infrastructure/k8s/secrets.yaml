apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: comp-intel
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET"
  API_SECRET_KEY: "REPLACE_WITH_API_SECRET"
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: comp-intel
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DEBUG: "false"
  REDIS_URL: "redis://redis:6379"
  DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/bullion_intel"
  RATE_LIMIT_API: "100"
  RATE_LIMIT_WS: "60"
  SCRAPER_TIMEOUT: "30"
  SCRAPER_RETRY_COUNT: "3"
  SCRAPER_RATE_LIMIT: "1"