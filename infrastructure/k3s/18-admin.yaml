# Admin panel basic auth secret (bcrypt hash)
apiVersion: v1
kind: Secret
metadata:
  name: admin-basic-auth
  namespace: comp-intel
type: Opaque
stringData:
  users: "admin:$2y$05$2HY8.EH5bxuL5v6xHayZu.TNBpilItG8Myo4lT8oQn4Wx6JazhtjO"
---
# Traefik basic auth middleware for admin panel
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-basic-auth
  namespace: comp-intel
spec:
  basicAuth:
    secret: admin-basic-auth
    removeHeader: true
---
# Admin frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: comp-intel
  labels:
    app: admin-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-frontend
  template:
    metadata:
      labels:
        app: admin-frontend
    spec:
      nodeSelector:
        node-role: app
      containers:
      - name: admin-frontend
        image: REGISTRY_PLACEHOLDER/admin-frontend:IMAGE_TAG
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Admin frontend service
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
  namespace: comp-intel
  labels:
    app: admin-frontend
spec:
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: admin-frontend
---
# Admin ingress — ops.spotcompare.com
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: comp-intel
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: comp-intel-admin-basic-auth@kubernetescrd,comp-intel-security-headers@kubernetescrd,comp-intel-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - ops.DOMAIN_PLACEHOLDER
    secretName: origin-ca-tls
  rules:
  - host: ops.DOMAIN_PLACEHOLDER
    http:
      paths:
      # API routes → backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # Health check → backend
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # Admin frontend (default catch-all)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-frontend
            port:
              number: 80
