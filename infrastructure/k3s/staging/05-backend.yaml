# Staging Backend — single replica, no HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: comp-intel-staging
  labels:
    app: backend
    environment: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
      environment: staging
  template:
    metadata:
      labels:
        app: backend
        environment: staging
    spec:
      nodeSelector:
        node-role: app
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
      - name: backend
        image: REGISTRY_PLACEHOLDER/backend:IMAGE_TAG
        ports:
        - containerPort: 8000
        env:
        - name: DEPLOY_MODE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DEPLOY_MODE
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: REDIS_URL
        - name: SHARED_REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SHARED_REDIS_URL
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://postgres:$(POSTGRES_PASSWORD)@pgbouncer:6432/bullion_intel_staging"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: API_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: API_SECRET_KEY
        - name: MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MASTER_KEY
        - name: MEILISEARCH_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MEILISEARCH_URL
        - name: MEILISEARCH_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MEILISEARCH_MASTER_KEY
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: RAZORPAY_KEY_ID
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: RAZORPAY_KEY_SECRET
        - name: RAZORPAY_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: RAZORPAY_WEBHOOK_SECRET
        - name: RAZORPAY_PLAN_ID_MONTHLY
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: RAZORPAY_PLAN_ID_MONTHLY
        - name: RAZORPAY_PLAN_ID_ANNUAL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: RAZORPAY_PLAN_ID_ANNUAL
        - name: TURNSTILE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: TURNSTILE_SECRET_KEY
        - name: INTERNAL_API_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: INTERNAL_API_SECRET
        - name: MSG91_AUTH_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MSG91_AUTH_KEY
              optional: true
        - name: MSG91_TEMPLATE_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MSG91_TEMPLATE_ID
              optional: true
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GROQ_API_KEY
              optional: true
        - name: DEV_OTP_BYPASS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DEV_OTP_BYPASS
        - name: COOKIE_SECURE
          value: "true"
        - name: WORKERS
          value: "2"
        resources:
          requests:
            cpu: 150m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: comp-intel-staging
spec:
  selector:
    app: backend
    environment: staging
  ports:
  - port: 8000
    targetPort: 8000
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
