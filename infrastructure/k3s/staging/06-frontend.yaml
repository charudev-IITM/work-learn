# Staging Frontend — single replica, no HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: comp-intel-staging
  labels:
    app: frontend
    environment: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
      environment: staging
  template:
    metadata:
      labels:
        app: frontend
        environment: staging
    spec:
      nodeSelector:
        node-role: app
      containers:
      - name: frontend
        image: REGISTRY_PLACEHOLDER/frontend:IMAGE_TAG
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: comp-intel-staging
spec:
  selector:
    app: frontend
    environment: staging
  ports:
  - port: 80
    targetPort: 80
