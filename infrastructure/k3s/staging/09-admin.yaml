# Staging Admin Panel — ops-staging.spotcompare.com
# Reuses the same admin-frontend image as production.
# Protected by the existing staging basic auth middleware.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-frontend
  namespace: comp-intel-staging
  labels:
    app: admin-frontend
    environment: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: admin-frontend
      environment: staging
  template:
    metadata:
      labels:
        app: admin-frontend
        environment: staging
    spec:
      nodeSelector:
        node-role: app
      containers:
      - name: admin-frontend
        image: REGISTRY_PLACEHOLDER/admin-frontend:IMAGE_TAG
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: admin-frontend
  namespace: comp-intel-staging
  labels:
    app: admin-frontend
    environment: staging
spec:
  selector:
    app: admin-frontend
    environment: staging
  ports:
  - port: 80
    targetPort: 80
---
# Staging admin ingress — ops-staging.spotcompare.com
# Reuses the staging namespace's basic-auth, security-headers, and rate-limit middlewares.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: comp-intel-staging
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: comp-intel-staging-basic-auth@kubernetescrd,comp-intel-staging-security-headers@kubernetescrd,comp-intel-staging-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - ops-staging.DOMAIN_PLACEHOLDER
    secretName: origin-ca-tls
  rules:
  - host: ops-staging.DOMAIN_PLACEHOLDER
    http:
      paths:
      # API routes → staging backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # Health check → staging backend
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      # Admin frontend (default catch-all)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-frontend
            port:
              number: 80
