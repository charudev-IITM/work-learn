name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [dev, staging, main]
  workflow_call:

jobs:
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=frontend

      - name: Lint
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

  admin:
    name: Admin (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=admin

      - name: Type check
        run: cd admin && npx tsc --noEmit

      - name: Build
        run: cd admin && npm run build

  backend:
    name: Backend (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Check main app syntax
        run: python -m py_compile backend/app/main.py

      - name: Check scraper worker syntax
        run: python -m py_compile backend/scraper_worker.py

      - name: Check news worker syntax
        run: python -m py_compile backend/news_worker.py
